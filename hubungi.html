        <h2 class="text-2xl font-bold mb-6">Kirimkan kita pesan</h2>
        <div class="bg-white rounded-3xl p-8 shadow-sm flex-grow">
          <form action="#" class="flex flex-col h-full" method="POST">
            <div class="mb-5">
              <label class="block text-sm font-medium text-gray-700 mb-2" for="nama">Nama</label>
              <input class="w-full bg-input-bg border-none rounded-xl px-4 py-3 focus:ring-2 focus:ring-brand-dark focus:bg-white transition-colors" id="nama" name="nama" required type="text"/>
            </div>
            <div class="mb-5">
              <label class="block text-sm font-medium text-gray-700 mb-2" for="email">Email</label>
              <input class="w-full bg-input-bg border-none rounded-xl px-4 py-3 focus:ring-2 focus:ring-brand-dark focus:bg-white transition-colors" id="email" name="email" required type="email"/>
            </div>
            <div class="mb-6 flex-grow flex flex-col">
              <label class="block text-sm font-medium text-gray-700 mb-2" for="pesan">Pesan</label>
              <textarea class="w-full bg-input-bg border-none rounded-xl px-4 py-3 focus:ring-2 focus:ring-brand-dark focus:bg-white transition-colors resize-none flex-grow" id="pesan" minlength="50" name="pesan" placeholder="Tulis ulasan minimal 50 karakter" required rows="5"></textarea>
            </div>
            <div class="flex justify-end mt-auto">
              <button class="bg-brand-dark text-white rounded-full px-8 py-2.5 font-semibold text-sm hover:bg-black transition-colors" type="submit">
