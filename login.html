<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Login - Alunan Nusantara</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
    body {
      font-family: 'Poppins', sans-serif;
    }
    .glass-panel {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'brown-primary': '#2d1109',
            'facebook-blue': '#4267B2',
          }
        }
      }
    }
  </script>
</head>

<!-- 🖼️ BACKGROUND → assets/images/background/loginbg.png -->
<body
  class="min-h-screen bg-cover bg-center flex items-center justify-center p-4 relative"
  style="background-image: url('assets/images/background/loginbg.png');"
>

  <!-- Navbar -->
  <nav class="absolute top-0 left-0 right-0 z-20 flex items-center justify-between px-8 py-4">
    <!-- 🖼️ LOGO → assets/images/logo/logoweb.png -->
    <img
      alt="Alunan Nusantara Logo"
      class="h-12"
      src="assets/images/logo/logoweb.png"
    />
    <div class="flex items-center gap-8 text-sm font-medium" style="color: #260701;">
      <a href="index.html" class="hover:opacity-70 transition-opacity" style="color: #260701;">Beranda</a>
      <a href="jelajahi.html" class="hover:opacity-70 transition-opacity" style="color: #260701;">Jelajahi</a>
      <a href="hubungi.html" class="hover:opacity-70 transition-opacity" style="color: #260701;">Hubungi kami</a>
      <a href="login.html" class="pb-0.5 font-semibold" style="color: #260701; border-bottom: 2px solid #260701;">Masuk</a>
    </div>
  </nav>

  <!-- Main Container -->
  <main class="glass-panel w-full max-w-5xl rounded-3xl overflow-hidden flex flex-col md:flex-row shadow-2xl relative z-10 mt-10">

    <!-- LEFT: Illustration -->
    <section class="w-full md:w-1/2 flex items-center justify-center py-8 px-8 min-h-[350px] md:min-h-0">
      <!-- 🖼️ KARAKTER → assets/images/background/animbg.png -->
      <img
        alt="Character illustration"
        class="max-w-full max-h-[480px] object-contain drop-shadow-2xl"
        src="assets/images/background/animbg.png"
      />
    </section>

    <!-- RIGHT: Login Form -->
    <section class="w-full md:w-1/2 bg-white rounded-t-3xl md:rounded-l-none md:rounded-r-3xl p-8 md:p-12 flex flex-col justify-center">

      <!-- Header -->
      <div class="text-center mb-8">
        <h1 class="text-3xl md:text-4xl font-bold text-gray-900 mb-2 tracking-tight">Selamat Datang!</h1>
        <p class="text-sm text-gray-500">Masuk ke akun anda untuk mengakses semua layanan</p>
      </div>

      <!-- Form -->
      <form action="#" class="space-y-6" method="POST">

        <!-- Email -->
        <div>
          <label class="block text-sm font-semibold text-gray-900 mb-2" for="email">Email</label>
          <div class="relative flex items-end border-b border-gray-400 focus-within:border-gray-900 pb-2 transition-colors">
            <div class="absolute inset-y-0 left-0 flex items-end pb-2 pointer-events-none">
              <i class="fa-solid fa-envelope text-gray-800 text-lg"></i>
            </div>
            <input
              class="block w-full pl-8 pr-3 py-1 border-0 bg-transparent text-sm placeholder-gray-400 focus:ring-0 focus:outline-none"
              id="email"
              name="email"
              placeholder="Masukkan Email"
              required
              type="email"
            />
          </div>
        </div>

        <!-- Password -->
        <div>
          <label class="block text-sm font-semibold text-gray-900 mb-2" for="password">Kata Sandi</label>
          <div class="relative flex items-end border-b border-gray-400 focus-within:border-gray-900 pb-2 transition-colors">
            <div class="absolute inset-y-0 left-0 flex items-end pb-2 pointer-events-none">
              <i class="fa-solid fa-lock text-gray-800 text-lg"></i>
            </div>
            <input
              class="block w-full pl-8 pr-3 py-1 border-0 bg-transparent text-sm placeholder-gray-400 focus:ring-0 focus:outline-none"
              id="password"
              name="password"
              placeholder="Masukkan Kata Sandi"
              required
              type="password"
            />
          </div>
        </div>

        <!-- Remember Me & Forgot Password -->
        <div class="flex items-center justify-between mt-2">
          <div class="flex items-center">
            <input
              checked
              class="h-4 w-4 border-gray-300 rounded cursor-pointer accent-black"
              id="remember-me"
              name="remember-me"
              type="checkbox"
            />
            <label class="ml-2 block text-sm text-gray-900 cursor-pointer" for="remember-me">Ingatkan saya</label>
          </div>
        <a class="text-sm font-medium text-gray-900 hover:text-gray-700" href="#">Lupa Kata Sandi?</a>
        </div>

        <!-- Submit -->
        <div class="pt-2">
          <button
            class="w-full flex justify-center py-3 px-4 rounded-lg shadow-sm text-sm font-semibold text-white bg-brown-primary hover:bg-opacity-90 focus:outline-none transition-colors"
            type="submit"
          >
            Masuk
          </button>
        </div>
      </form>

      <!-- Divider -->
      <div class="mt-8 mb-5 relative">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-gray-300"></div>
        </div>
        <div class="relative flex justify-center">
          <span class="px-4 bg-white text-sm text-gray-500">Masuk dengan</span>
        </div>
      </div>

      <!-- Social Login -->
      <div class="space-y-3">
        <button
          class="w-full flex items-center justify-center px-4 py-2.5 border border-gray-300 rounded-lg bg-white text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors"
          type="button"
        >
          <img
            alt="Google logo"
            class="h-4 w-4 mr-2"
            src="https://www.svgrepo.com/show/475656/google-color.svg"
          />
          Masuk dengan Google
        </button>

        <button
          class="w-full flex items-center justify-center px-4 py-2.5 rounded-lg bg-[#4267B2] text-sm font-semibold text-white hover:bg-opacity-90 transition-colors"
          type="button"
        >
          <i class="fa-brands fa-facebook text-white text-lg mr-2"></i>
          Masuk dengan Facebook
        </button>
      </div>

      <!-- Register Link -->
      <div class="mt-6 text-center text-sm text-gray-500">
        Belum punya akun?
        <a class="font-bold text-gray-900 hover:underline" href="register.html">Daftar sekarang</a>
      </div>

    </section>
  </main>

</body>
</html>
